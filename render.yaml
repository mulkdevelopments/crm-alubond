databases:
  - name: alubond-crm-db
    plan: basic-256mb
    databaseName: alubond_crm
    user: alubond

services:
  - type: web
    name: alubond-crm-api
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm ci --include=dev && npm run prisma:generate && npm run prisma:push && npm run build
    startCommand: npm run start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_PREFIX
        value: /api/v1
      - key: FILE_STORAGE_PROVIDER
        value: vercel_blob
      - key: BLOB_ACCESS
        value: private
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: DATABASE_URL
        fromDatabase:
          name: alubond-crm-db
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://crm.alubond.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_SETUP_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@alubondcrm.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_FIRST_NAME
        value: System
      - key: ADMIN_LAST_NAME
        value: Admin
      - key: OPENAI_API_KEY
        sync: false
      - key: BLOB_READ_WRITE_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: Alubond CRM <crm@alubond.com>
      - key: APP_BASE_URL
        value: https://crm.alubond.com
